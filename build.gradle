### 4. File `gradle.properties` chuẩn
Nếu bạn chưa có file này, robot sẽ báo lỗi ngay lập tức:
*   **Tên file:** `gradle.properties`[cite: 2]
*   **Nội dung:**
```properties
org.gradle.jvmargs=-Xmx2G
minecraft_version=1.20.1
yarn_mappings=1.20.1+build.10
loader_version=0.14.22
```[cite: 2]

Bạn hãy kiểm tra lại tab **Code** xem có thiếu file nào không nhé. Nếu bạn đã có đủ mà vẫn lỗi, hãy gửi ảnh màn hình chi tiết lỗi ở Bước 2 cho tôi!
